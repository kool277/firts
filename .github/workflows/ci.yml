name: CI Pipeline

# ── When does this run? ──────────────────────────────────────────────────────
on:
  push:
    branches: [main]          # every push to main
  pull_request:
    branches: [main]          # every PR that targets main

# ── Shared variables ─────────────────────────────────────────────────────────
env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/firts

# ── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
 
  # ── Job 1: Install deps and run tests ──────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v


  # ── Job 2: Build Docker image and push to Docker Hub ───────────────────────
  docker:
   name: Docker Build & Push
   runs-on: ubuntu-latest
   needs: test                          # only runs if tests passed
   if: github.ref == 'refs/heads/main' && github.event_name == 'push'

   steps:
     - name: Checkout source code
       uses: actions/checkout@v4

     - name: Set up Docker Buildx
       uses: docker/setup-buildx-action@v3

     - name: Log in to Docker Hub
       uses: docker/login-action@v3
       with:
         username: ${{ secrets.DOCKERHUB_USERNAME }}
         password: ${{ secrets.DOCKERHUB_TOKEN }}

     - name: Build and push image
       uses: docker/build-push-action@v5
       with:
         context: .
         push: true
         tags: |
           ${{ env.IMAGE_NAME }}:latest
           ${{ env.IMAGE_NAME }}:${{ github.sha }}
         cache-from: type=gha
         cache-to: type=gha,mode=max

     - name: Print image info
       run: |
         echo "Image pushed:"
         echo "  ${{ env.IMAGE_NAME }}:latest"
         echo "  ${{ env.IMAGE_NAME }}:${{ github.sha }}"
