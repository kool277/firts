name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/flask-demo

jobs:

  # ── Job 1: Install dependencies and run tests ─────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v


  # ── Job 2: Build Docker image and push to Docker Hub ─────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo "Pushed: ${{ env.IMAGE_NAME }}:latest"
          echo "Pushed: ${{ env.IMAGE_NAME }}:${{ github.sha }}"


  # ── Job 3: Pull image from Docker Hub and run it as a container ───────────
  # shell: cmd is used for all steps — cmd.exe is always available on Windows,
  # has no execution policy, and Docker CLI works perfectly inside it.
  # GitHub Actions ${{ }} expressions are resolved before the shell sees them,
  # so no cmd-specific variable syntax is needed.
  # Note: this job requires a local self-hosted runner registered in GitHub
  deploy:
    name: Deploy to Local PC
    runs-on: [self-hosted, windows]
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: local-dev

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Stop and remove existing container
        shell: cmd
        run: docker rm -f flask-demo
        continue-on-error: true

      - name: Pull image from Docker Hub
        shell: cmd
        run: docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run new container
        shell: cmd
        run: docker run -d --name flask-demo --restart unless-stopped -p 8080:8080 ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Health check
        shell: cmd
        run: |
          ping 127.0.0.1 -n 4 > nul
          curl -f http://localhost:8080/health
          echo Deploy successful
